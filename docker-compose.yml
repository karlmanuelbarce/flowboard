services:
  db:
    image: postgres:16
    container_name: flowboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowboard-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: flowboard-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowboard-api
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/flowboard
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    volumes:
      - ./api:/app/api
      - /app/api/node_modules

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: flowboard-worker
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/flowboard
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    volumes:
      - ./worker/src:/app/src

volumes:
  postgres_data:
